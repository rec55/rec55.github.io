<!doctype html>
<html lang="ru">
<head>
<title>merch55 — товар</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Страница товара merch55 с галереей фотографий, выбором варианта и корзиной.">
<link rel="icon" href="../media/website/rec55.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Rubik:wght@400;500;700&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/merch.css">
<script defer src="../assets/merch.js"></script>
</head>
<body>
<div class="page-shell">
  <header class="merch-header">
    <a class="merch-brand" href="index.html" aria-label="Перейти на главную страницу merch55">
      <img src="../media/website/rec55logoBlackk-1.png" alt="Rec 55">
      <span class="brand-copy">
        <span class="brand-name">merch55</span>
        <span class="brand-note">by Rec 55</span>
      </span>
    </a>

    <nav class="merch-nav" aria-label="Навигация страницы">
      <a href="index.html#catalog">Каталог</a>
      <a href="index.html#delivery">Доставка</a>
      <a href="index.html#faq">FAQ</a>
    </nav>

    <a class="header-link" href="index.html">merch55</a>

    <button class="cart-toggle" type="button" aria-expanded="false" aria-controls="cartDrawer" data-cart-toggle>
      <span>Корзина</span>
      <span class="cart-count" data-cart-count>0</span>
    </button>
  </header>

  <main class="product-page">
    <div data-product-detail></div>
    <noscript>
      <p class="catalog-note">Для страницы товара нужен включённый JavaScript.</p>
    </noscript>
  </main>

  <footer class="merch-footer">
    <div>© merch55 / Rec 55</div>
    <div class="footer-links">
      <a href="https://instagram.com/rec55kg">Instagram</a>
      <a href="https://www.youtube.com/@rec55kg">YouTube</a>
      <a href="https://t.me/rec55kg">Telegram</a>
    </div>
  </footer>

  <div class="cart-backdrop" data-cart-backdrop></div>
  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="cart-panel">
      <div class="cart-header">
        <div>
          <p class="eyebrow">merch55</p>
          <h2>Корзина</h2>
        </div>
        <button class="cart-close" type="button" aria-label="Закрыть корзину" data-cart-close>×</button>
      </div>

      <div class="cart-empty" data-cart-empty>Корзина пока пустая. Добавьте товары из каталога.</div>
      <div class="cart-items hidden" data-cart-items></div>

      <div class="cart-footer">
        <div class="cart-total">
          <span>Итого</span>
          <strong data-cart-total>0 сом</strong>
        </div>
        <button class="btn btn-primary" type="button" data-cart-checkout disabled>Оформить в WhatsApp</button>
        <button class="btn btn-secondary" type="button" data-cart-clear disabled>Очистить корзину</button>
      </div>
    </div>
  </aside>
</div>
</body>
</html>
